<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spread</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- ── Waiting overlay ─────────────────────────────────── -->
  <div class="overlay" id="overlay">
    <div class="overlay-box">
      <h2 class="overlay-title" id="overlay-title">Waiting for opponent…</h2>
      <p class="overlay-body" id="overlay-body">Share this link or code with your opponent</p>
      <div class="overlay-code-row">
        <span class="overlay-code" id="overlay-code"></span>
        <button class="overlay-copy-btn" id="copy-btn">Copy link</button>
      </div>
    </div>
  </div>

  <!-- ── Error banner ───────────────────────────────────── -->
  <div class="error-banner hidden" id="error-banner">
    <span class="error-banner-text" id="error-banner-text"></span>
    <button class="error-banner-dismiss" id="error-banner-dismiss">✕</button>
  </div>

  <!-- ── Game UI ─────────────────────────────────────────── -->
  <header class="banner">
    <h1 class="banner-title">SPREAD</h1>
    <span class="turn-indicator" id="turn-indicator">Player 1's Turn</span>
    <span class="turn-counter" id="turn-counter">Turn 0</span>
    <div class="turn-controls">
      <span class="action-count">Actions: <span id="action-count">0 / 3</span><span class="action-bump" id="action-bump"></span></span>
      <button class="turn-btn" id="restart-btn">Restart Turn</button>
      <button class="turn-btn" id="submit-btn">Submit Turn</button>
    </div>
  </header>

  <main class="main-content">
    <aside class="sidebar">
      <div class="sidebar-section">
        <p class="sidebar-label player-1-label">Player 1</p>
        <button class="unit-btn" data-player="1" data-type="large">Large <span class="unit-cost" id="cost-1-large">$100</span></button>
        <button class="unit-btn" data-player="1" data-type="medium">Medium <span class="unit-cost" id="cost-1-medium">$60</span></button>
        <button class="unit-btn" data-player="1" data-type="small">Small <span class="unit-cost" id="cost-1-small">$25</span></button>
        <button class="unit-btn" data-player="1" data-type="tower">Tower <span class="unit-cost" id="cost-1-tower">$50</span></button>
      </div>
      <div class="sidebar-section">
        <p class="sidebar-label player-2-label">Player 2</p>
        <button class="unit-btn" data-player="2" data-type="large">Large <span class="unit-cost" id="cost-2-large">$100</span></button>
        <button class="unit-btn" data-player="2" data-type="medium">Medium <span class="unit-cost" id="cost-2-medium">$60</span></button>
        <button class="unit-btn" data-player="2" data-type="small">Small <span class="unit-cost" id="cost-2-small">$25</span></button>
        <button class="unit-btn" data-player="2" data-type="tower">Tower <span class="unit-cost" id="cost-2-tower">$50</span></button>
      </div>
    </aside>

    <div class="board" id="board"></div>

    <aside class="stats-panel">
      <div class="stats-block" id="stats-row-1">
        <div class="stats-header">
          <span class="player-dot player-1-dot"></span>
          <span class="stats-player-label player-1-label">Player 1</span>
        </div>
        <div class="stats-values">
          <div class="stats-item">
            <span class="stats-item-label">Money</span>
            <span class="stats-item-value stats-money" id="money-1">$0</span>
          </div>
          <div class="stats-item">
            <span class="stats-item-label">Territory</span>
            <span class="stats-item-value stats-territory" id="territory-1">0</span>
            <span class="income-preview" id="income-preview-1"></span>
          </div>
          <div class="stats-item">
            <span class="stats-item-label">Net Worth</span>
            <span class="stats-item-value stats-item-value-sm" id="net-worth-1">$0</span>
          </div>
        </div>
        <div class="income-breakdown" id="income-breakdown-1"></div>
      </div>

      <div class="terr-adv-section">
        <div class="terr-adv-label">Territory</div>
        <span class="territory-advantage terr-adv-sm terr-adv-zero" id="territory-advantage">0</span>
      </div>

      <div class="stats-block" id="stats-row-2">
        <div class="stats-header">
          <span class="player-dot player-2-dot"></span>
          <span class="stats-player-label player-2-label">Player 2</span>
        </div>
        <div class="stats-values">
          <div class="stats-item">
            <span class="stats-item-label">Money</span>
            <span class="stats-item-value stats-money" id="money-2">$0</span>
          </div>
          <div class="stats-item">
            <span class="stats-item-label">Territory</span>
            <span class="stats-item-value stats-territory" id="territory-2">0</span>
            <span class="income-preview" id="income-preview-2"></span>
          </div>
          <div class="stats-item">
            <span class="stats-item-label">Net Worth</span>
            <span class="stats-item-value stats-item-value-sm" id="net-worth-2">$0</span>
          </div>
        </div>
        <div class="income-breakdown" id="income-breakdown-2"></div>
      </div>
    </aside>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
